version: '3.8'

services:
  db:
    image: postgres:15
    container_name: finance-os-db
    environment:
      POSTGRES_USER: nuno
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: financedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nuno -d financedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: finance-os-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: finance-os-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: