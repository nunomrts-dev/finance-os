version: '3.8'

services:
  db:
    image: postgres:15
    container_name: finance-os-db
    environment:
      POSTGRES_USER: nuno
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: financedb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: finance-os-backend
    environment:
      DATABASE_URL: postgresql://nuno:localpassword@db:5432/financedb
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: finance-os-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app

volumes:
  postgres_data: